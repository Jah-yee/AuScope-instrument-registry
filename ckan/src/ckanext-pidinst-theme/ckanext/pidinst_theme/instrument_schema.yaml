scheming_version: 2
dataset_type: instrument
about: AuScope Instrument Registry schema based on PIDINST
about_url: https://www.github.com/AuScope/AuScope-instrument-registry

dataset_fields:
  - field_name: identifier_source
    label: Identifier Source
    default: system
    required: true
    form_snippet: identifier_source_hidden_field.html
    display_snippet: null
    validators: identifier_source_validator
    output_validators: ignore_missing unicode_safe strip_value
    choices:
      - value: system
        label: System DOI
      - value: external
        label: External identifier
    help_text: Internal identifier management source.
    groupBy: About Instrument

  - field_name: identifier_url
    label: Identifier
    form_snippet: identifier_url_field.html
    display_snippet: null
    validators: pidinst_identifier_url_validator
    output_validators: ignore_missing unicode_safe strip_value
    form_placeholder: https://doi.org/10.1234/example
    help_text: Full persistent identifier URL for an existing externally identified instrument or platform.
    groupBy: About Instrument

  - field_name: doi
    label: Identifier
    validators: ignore_missing unicode_safe strip_value
    output_validators: ignore_missing unicode_safe strip_value
    form_snippet: null
    display_snippet: null
    form_placeholder: DOI minted by this registry
    help_text: DOI minted and managed by this registry.
    groupBy: About Instrument

  - field_name: schema_version
    label: Schema Version
    form_snippet: hidden_field.html
    form_placeholder: Version number of the PIDINST schema used in this record
    help_text: Version number of the PIDINST schema used in this record
    groupBy: About Instrument

  - field_name: is_platform
    label: Is Platform
    required: true
    form_snippet: is_platform_hidden_field.html
    default: "false"
    validators: ignore_missing boolean_validator
    output_validators: ignore_missing boolean_validator
    help_text: Defines whether the instrument is a platform (e.g. a buoy, a ship, a satellite) that can host other instruments or not
    groupBy: About Instrument

  - field_name: title
    label: Title
    preset: title
    form_placeholder: Name by which the instrument instance is known
    help_text: "Name by which the instrument instance is known"
    groupBy: About Instrument

  - field_name: name
    label: URL
    preset: dataset_slug
    form_snippet: hidden_field.html
    form_placeholder: eg. my-instrument
    groupBy: About Instrument

  - field_name: version_number
    label: Version
    required: false
    form_snippet: hidden_field.html
    display_snippet: null
    validators: ignore_missing int_validator
    default: 1
    groupBy: About Instrument

  - field_name: version_handler_id
    label: Version Handler ID
    form_snippet: hidden_field.html
    display_snippet: null
    validators: ignore_missing
    required: false
    groupBy: About Instrument

  - field_name: owner_org
    label: Organization
    form_snippet: org_visibility.html
    validators: visibility_validator
    groupBy: About Instrument

  # ======================== INSTRUMENT CLASSIFICATION ========================
  - field_name: instrument_classification
    label: Instrument Classification
    preset: select
    required: true
    default: Geophysics
    choices:
      - value: Geophysics
        label: Geophysics
      - value: Geochemistry
        label: Geochemistry
      - value: Petrophysics
        label: Petrophysics
      - value: Other
        label: Other
    help_text: A high-level classification of the instrument.
    groupBy: About Instrument

  - field_name: instrument_type_gcmd_code
    label: Instrument Type (GCMD)
    label_platform: Platform Type (GCMD)
    form_snippet: hidden_field.html
    display_snippet: null
    label_field_name: instrument_type_gcmd
    gcmd_scheme: instruments
    gcmd_scheme_platform: platforms
    help_text: Select from the NASA GCMD Instrument/Sensors Keywords (served via ARDC Research Vocabularies Australia). Start typing to search and select one or more.
    help_text_platform: Select from the NASA GCMD Platforms Keywords (served via ARDC Research Vocabularies Australia). Start typing to search and select one or more.
    groupBy: About Instrument

  - field_name: instrument_type_gcmd
    form_snippet: hidden_field.html
    display_snippet: null
    help_text: Select from the NASA GCMD Instrument/Sensors Keywords (served via ARDC Research Vocabularies Australia). Start typing to search and select one or more.
    groupBy: About Instrument

  - field_name: instrument_type
    label: Instrument Type
    label_platform: Platform Type
    preset: composite_repeating
    validators: composite_repeating_validator
    form_snippet: type_picker_field.html
    form_blanks: 0
    groupBy: About Instrument
    gcmd_scheme: instruments
    gcmd_scheme_platform: platforms
    custom_taxonomy: instrument
    custom_taxonomy_platform: platform
    gcmd_label: Instrument Type (GCMD)
    gcmd_label_platform: Platform Type (GCMD)
    custom_label: Instrument Type (Custom)
    custom_label_platform: Platform Type (Custom)
    gcmd_code_field: instrument_type_gcmd_code
    gcmd_label_field: instrument_type_gcmd
    gcmd_help_text: Select from the NASA GCMD Instrument/Sensors Keywords. Start typing to search.
    custom_help_text: Select from custom taxonomy terms.
    help_text: Select one or more types from GCMD vocabulary and/or custom taxonomy.
    subfields:
      - field_name: instrument_type_name
        label: Type Name
        help_text: Classification of the type of the instrument or platform

      - field_name: instrument_type_identifier
        label: Type Identifier
        help_text: Identifier for the instrument or platform type

      - field_name: instrument_type_identifier_type
        label: Type Identifier Type
        help_text: "Type of the identifier"

  # ======================== OWNER (PARTY) ========================
  # Owners are selected from the Party registry (CKAN groups of type
  # "party").  Users pick one or more parties from a dropdown and
  # provide a contact email for each.  If the party already has a
  # contact recorded, it is used as the default but can be overridden.

  - field_name: owner
    label: Owner
    preset: composite_repeating
    validators: composite_repeating_validator
    form_snippet: composite_repeating_field.html
    form_blanks: 1
    groupBy: About Instrument
    required: true
    help_text: "Select one or more parties as owners. A contact email is required for each selected owner."
    subfields:
      - field_name: owner_party_id
        label: Owner
        form_snippet: owner_party_select.html
        help_text: "Select a party from the registry"
        validators: ignore_missing unicode_safe
        required: true

      - field_name: owner_name
        label: Owner Name
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Resolved party title — used by DOI minting as the contributor name."

      - field_name: owner_identifier
        label: Owner Identifier
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Party identifier (ROR or other) — used by DOI minting."

      - field_name: owner_identifier_type
        label: Owner Identifier Type
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Type of the party identifier — used by DOI minting."

      - field_name: owner_contact
        label: Owner Contact
        form_attrs:
          type: email
          placeholder: contact@example.edu.au
        help_text: "Contact email for this owner. Pre-filled from party if available."
        validators: ignore_missing unicode_safe strip_value email_validator


  - field_name: manufacturer
    label: Manufacturer
    preset: composite_repeating
    validators: composite_repeating_validator
    form_snippet: composite_repeating_field.html
    required: true
    form_blanks: 1
    groupBy: About Instrument
    subfields:
      - field_name: manufacturer_party_id
        label: Manufacturer
        form_snippet: manufacturer_party_select.html
        help_text: "Select a manufacturer from the party registry"
        validators: ignore_missing unicode_safe
        required: true

      - field_name: manufacturer_name
        label: Manufacturer Name
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Resolved party title — auto-populated from selected party."

      - field_name: manufacturer_identifier
        label: Manufacturer Identifier
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Party identifier — auto-populated from selected party."

      - field_name: manufacturer_identifier_type
        label: Manufacturer Identifier Type
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Type of the party identifier — auto-populated from selected party."

  - field_name: model
    label: Model
    required: true
    preset: composite_repeating
    validators: composite_repeating_validator
    form_snippet: composite_repeating_field.html
    form_blanks: 1
    groupBy: About Instrument
    composite_rules:
      - when_present: model_identifier
        require: [model_identifier_type]
    subfields:
      - field_name: model_name
        label: Model Name
        required: true
        help_text: Full name of the model

      - field_name: model_identifier
        label: Model Identifier
        help_text: Identifier used to identify the model

      - field_name: model_identifier_type
        label: Model Identifier Type
        help_text: "Type of the identifier"

  - field_name: date
    label: Date
    preset: composite_repeating
    validators: composite_repeating_validator pidinst_date_repeating_validator
    form_snippet: composite_repeating_field.html
    form_blanks: 1
    groupBy: About Instrument
    subfields:
      - field_name: date_value
        label: Date
        required: true
        validators: not_empty
        form_attrs:
          placeholder: "YYYY or YYYY-MM or YYYY-MM-DD; Coverage also supports start/end, start/, /end"
        help_text: Accepts YYYY, YYYY-MM, or YYYY-MM-DD. Coverage also accepts ranges like 2020-01/ or 2020-01-01/2026-04-06

      - field_name: date_type
        label: Date Type
        preset: select
        required: true
        choices:
          - value: Commissioned
            label: Commissioned
          - value: DeCommissioned
            label: DeCommissioned
          - value: Coverage
            label: Period of Activity
        help_text: The type of the date

  - field_name: measured_variable_gcmd_code
    label: Measured Variables (GCMD)
    form_snippet: hidden_field.html
    display_snippet: null
    label_field_name: measured_variable_gcmd
    gcmd_scheme: measured_variables
    help_text: Select one or more measured variables from the GCMD Measurement Name Keywords vocabulary (autocomplete)
    groupBy: About Instrument

  - field_name: measured_variable_gcmd
    form_snippet: hidden_field.html
    display_snippet: null
    help_text: Select one or more measured variables from the GCMD Measurement Name Keywords vocabulary (autocomplete)
    groupBy: About Instrument


  - field_name: measured_variable
    label: Measured Variables
    preset: composite_repeating
    validators: composite_repeating_validator
    form_snippet: measured_var_picker_field.html
    form_blanks: 0
    groupBy: About Instrument
    gcmd_scheme: measured_variables
    custom_taxonomy: measured_variable
    gcmd_label: Measured Variables (GCMD)
    custom_label: User Specified Measured Variables
    gcmd_code_field: measured_variable_gcmd_code
    gcmd_label_field: measured_variable_gcmd
    gcmd_help_text: Select from the GCMD Measurement Name Keywords vocabulary.
    custom_help_text: Select from custom taxonomy terms, or type to add new.
    help_text: Select one or more measured variables from GCMD vocabulary and/or custom taxonomy.
    subfields:
      - field_name: measured_variable_name
        label: Variable Name
        help_text: Name of the measured variable

      - field_name: measured_variable_identifier
        label: Variable Identifier
        help_text: URI identifier for the measured variable

      - field_name: measured_variable_identifier_type
        label: Variable Identifier Type
        help_text: "Type of the identifier"

  # - field_name: gcmd_keywords_code
  #   label: GCMD Science Keywords
  #   # required: true
  #   form_snippet: gcmd_field.html
  #   display_snippet: gcmd_field.html
  #   help_text: Global Change Master Directory (GCMD) science keywords
  #   groupBy: About Instrument

  # - field_name: gcmd_keywords
  #   label: GCMD Science Keywords
  #   form_snippet: hidden_field.html
  #   help_text: Global Change Master Directory (GCMD) science keywords
  #   display_snippet: null
  #   groupBy: About Instrument

  - field_name: user_keywords
    label: User Specified Keywords
    form_snippet: field_terms_autocomplete.html
    display_snippet: field_terms_display.html
    validators: ignore_missing json_list_or_string
    output_validators: json_list_output
    help_text: Keywords help with the discovery of the instrument
    groupBy: About Instrument

  - field_name: description
    label: Description
    preset: markdown
    help_text: Technical description of the device and its capabilities
    groupBy: About Instrument

  - field_name: funder
    label: Funding References
    preset: composite_repeating
    form_snippet: composite_repeating_field.html
    validators: composite_repeating_validator
    form_blanks: 0
    groupBy: About Instrument
    help_text: "Select a party as the funder and provide award details."
    subfields:
      - field_name: funder_party_id
        label: Funder
        form_snippet: funder_party_select.html
        help_text: "Select a party from the registry as the funder."
        validators: ignore_missing unicode_safe

      - field_name: funder_name
        label: Funder Name
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Resolved party title — auto-populated from selected party."

      - field_name: funder_identifier
        label: Funder Identifier
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Party identifier (ROR or other) — auto-populated from selected party."

      - field_name: funder_identifier_type
        label: Funder Identifier Type
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing unicode_safe
        help_text: "Type of the party identifier — auto-populated from selected party."

      - field_name: award_number
        label: Award Number
        help_text: The code assigned by the funder to a sponsored award (grant).

      - field_name: award_uri
        label: Award URI
        help_text: The URI leading to a page provided by the funder for more information about the award (grant).

      - field_name: award_title
        label: Award Title
        help_text: The human readable title or name of the award (grant).

  - field_name: credit
    label: Credit
    form_snippet: textarea.html
    help_text: The Credit field is where you acknowledge people or organisations who contributed
    groupBy: About Instrument

  - field_name: alternate_identifier_obj
    label: Alternate Identifier
    preset: composite_repeating
    form_snippet: composite_repeating_field.html
    validators: composite_repeating_validator
    form_blanks: 1
    groupBy: About Instrument
    required: true
    composite_rules:
      - when_present: alternate_identifier
        require: [alternate_identifier_type]
      - when_equals:
          field: alternate_identifier_type
          value: Other
        require: [alternate_identifier_name]
    subfields:
      - field_name: alternate_identifier_type
        label: Alternate Identifier Type
        # Conditionally Required
        required: true
        preset: select
        choices:
          - value: SerialNumber
            label: Serial Number
          - value: InventoryNumber
            label: Inventory Number
          - value: Other
            label: Other
        help_text: Type of the identifier

      - field_name: alternate_identifier_name
        label: Alternate Identifier Name
        show_if:
          field: alternate_identifier_type
          value: Other
        help_text: A supplementary name for the identifier type. This is mostly useful for "Other"

      - field_name: alternate_identifier
        label: Alternate Identifier
        help_text: Identifiers other than the PIDINST pertaining to the same instrument instance. This should be used if the instrument has a serial number. Other possible uses include an owner's inventory number or an entry in some instrument data base.




  # ======================== RELATED INSTRUMENTS ========================
  - field_name: related_instruments
    label: Related Instruments
    form_snippet: related_instruments_picker.html
    display_snippet: related_instruments_display.html
    validators: related_instruments_validator
    groupBy: Related Instruments
    help_text: Add component instruments that are part of this instrument.


  # ================= GEOLOCATION FIELDS =================
  - field_name: locality
    label: Locality
    help_text: The locality or named place where the instrument is located
    groupBy: Spatial & Temporal

  - field_name: location_choice
    label: Location Details
    preset: radio
    choices:
      - value: noLocation
        label: "No"
      - value: area
        label: Area on Map
      - value: point
        label: Single point on Map
    default: noLocation
    display_snippet: map_field.html
    help_text: Choose how to specify the location.
    validators: location_validator
    groupBy: Spatial & Temporal

  - field_name: map_display
    label: Map Display
    form_snippet: map_field_multi_points.html
    display_snippet: null
    help_text: Interactive map for selecting coordinates.
    groupBy: Spatial & Temporal

  - field_name: location_data
    label: Location Data
    form_snippet: null
    display_snippet: null
    preset: json_object
    groupBy: Spatial & Temporal

  - field_name: spatial
    label: Spatial
    form_snippet: null
    display_snippet: null
    preset: json_object
    groupBy: Spatial & Temporal

  - field_name: epsg_code
    label: Geographic Coordinate System
    help_text: "A geographic coordinate system is a three-dimensional reference system that locates points on the Earth's surface. We use EPSG (https://epsg.io/) to represent the coordinate system"
    form_snippet: null
    display_snippet: null
    groupBy: Spatial & Temporal

  - field_name: epsg
    label: Geographic Coordinate System
    form_snippet: hidden_field.html
    help_text: "A geographic coordinate system is a three-dimensional reference system that locates points on the Earth's surface. We use EPSG (https://epsg.io/) to represent the coordinate system"
    display_snippet: null
    groupBy: Spatial & Temporal

  # ======================== RELATED RESOURCES ========================
  - field_name: related_identifier_obj
    label: Related Resources
    preset: composite_repeating
    form_snippet: composite_repeating_field.html
    validators: "composite_repeating_validator merge_related_instruments"
    form_blanks: 0
    groupBy: Related Resources
    composite_rules:
      - when_present: related_identifier
        require: [related_identifier_type]
    subfields:
      - field_name: related_identifier
        label: Related Identifier
        help_text: Identifiers of related resources

      - field_name: related_identifier_type
        label: Related Identifier Type
        required: true
        preset: select
        choices:
          - value: ARK
            label: ARK
          - value: arXiv
            label: arXiv
          - value: bibcode
            label: bibcode
          - value: DOI
            label: DOI
          - value: EAN13
            label: EAN13
          - value: EISSN
            label: EISSN
          - value: Handle
            label: Handle
          - value: IGSN
            label: IGSN
          - value: ISBN
            label: ISBN
          - value: ISSN
            label: ISSN
          - value: ISTC
            label: ISTC
          - value: LISSN
            label: LISSN
          - value: PMID
            label: PMID
          - value: PURL
            label: PURL
          - value: RAiD
            label: RAiD
          - value: RRID
            label: RRID
          - value: UPC
            label: UPC
          - value: URL
            label: URL
          - value: URN
            label: URN
          - value: w3id
            label: w3id
        help_text: Type of the identifier

      - field_name: related_identifier_name
        label: Related Identifier Name
        help_text: A name for the related resource (optional)

      - field_name: related_resource_type
        label: Resource Type
        required: true
        preset: select
        form_attrs:
          data-pidinst-reltype-driver: "1"
        choices:
          - value: Document
            label: Document
          - value: Metadata
            label: Metadata
          - value: Dataset
            label: Dataset
        help_text: Choose what kind of thing this identifier refers to. This will filter Relation Type options.

      - field_name: relation_type
        label: Relation Type
        required: true
        preset: select
        form_attrs:
          data-pidinst-reltype-target: "1"
        choices:
          - value: IsDescribedBy
            label: IsDescribedBy (The instrument is described by the document)
          - value: HasMetadata
            label: HasMetadata (The instrument has related metadata for the resource)
          - value: IsMetadataFor
            label: IsMetadataFor (The resource has metadata describing the instrument)
          - value: Collects
            label: Collects (The instrument collects the related dataset)
        help_text: Description of the relationship

      - field_name: related_instrument_package_id
        label: Related Instrument Package ID
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing
        help_text: Internal CKAN package ID of the selected instrument (used for prepopulation)

      - field_name: instrument_relation_role
        label: Instrument Relation Role
        form_snippet: composite_hidden_field.html
        display_snippet: null
        validators: ignore_missing
        help_text: Role of the related instrument (child or parent)

  # XXX This will be auto-generated after DOI minting, see metadata document

  - field_name: publisher
    label: Publisher
    required: true
    preset: select
    choices:
      - value: AuScope
        label: AuScope
    default: AuScope
    form_include_blank_choice: false
    help_text: The entity that publishes the instrument
    form_snippet: hidden_field.html
    display_snippet: publisher_field.html
    groupBy: About Instrument

  - field_name: publisher_identifier
    label: Publisher Identifier
    required: true
    preset: select
    choices:
      - value: "https://ror.org/04s1m4564"
        label: https://ror.org/04s1m4564
    default: https://ror.org/04s1m4564
    form_include_blank_choice: false
    form_snippet: hidden_field.html
    display_snippet: null
    help_text: The persistent identifier of the publisher
    validators: ignore_missing unicode_safe strip_value url_validator
    groupBy: About Instrument

  - field_name: publisher_identifier_type
    label: Publisher Identifier Type
    required: true
    default: ROR
    preset: select
    choices:
      - value: ROR
        label: ROR
    form_include_blank_choice: false
    form_snippet: hidden_field.html
    display_snippet: null
    help_text: The type of the persistent identifier represents the publisher
    groupBy: About Instrument

  - field_name: publication_date
    label: Publication Date
    form_snippet: hidden_field.html
    preset: date
    help_text: The date the instrument is published through the repository
    groupBy: About Instrument


  # ======================== DOI / PUBLICATION LIFECYCLE (INTERNAL) ========================
  - field_name: publication_status
    label: Publication Status
    form_snippet: hidden_field.html
    display_snippet: null
    required: false
    validators: ignore_missing unicode_safe strip_value
    choices:
      - value: published
        label: Published
      - value: withdrawn
        label: Withdrawn
      - value: duplicate
        label: Duplicate
    help_text: >-
      Internal DOI/publication lifecycle status. Expected future values include
      "published", "withdrawn", and "duplicate".
    groupBy: About Instrument

  - field_name: withdrawal_reason
    label: Withdrawal Reason
    form_snippet: hidden_field.html
    display_snippet: null
    required: false
    validators: ignore_missing unicode_safe strip_value
    help_text: >-
      Internal free-text reason for withdrawal. Reserved for a future controlled
      workflow; not user-editable via the UI in this step.
    groupBy: About Instrument

  - field_name: duplicate_of
    label: Duplicate Of
    form_snippet: hidden_field.html
    display_snippet: null
    required: false
    validators: ignore_missing unicode_safe strip_value
    help_text: >-
      Internal reference to the canonical record when this record is marked as a
      duplicate (eg a target DOI or dataset id). Reserved for a future controlled
      workflow; not user-editable via the UI in this step.
    groupBy: About Instrument


  - field_name: primary_contact_name
    label: Primary Contact Name
    required: true
    default: AuScope Instrument Repository
    help_text: A primary contact can be approached by users requesting further information of the instrument
    form_snippet: hidden_field.html
    groupBy: About Instrument

  - field_name: primary_contact_email
    label: Primary Contact Email
    required: true
    default: help@data.auscope.org.au
    display_snippet: email.html
    # display_email_name_field: primary_contact_name
    help_text: Email of the primary contact
    form_snippet: hidden_field.html
    groupBy: About Instrument

  - field_name: citation
    label: Citation
    form_snippet: null
    display_snippet: null
    help_text: The full bibliographic citation of the instrument
    groupBy: About Instrument


resource_fields:
  - field_name: url
    label: URL
    preset: resource_url_upload
    required: true
    validators: resource_url_validator

  - field_name: name
    label: Name
    help: The name of the resource (will be auto-generated from file name if not provided)

  - field_name: pidinst_is_cover_image
    label: Cover photo
    form_snippet: cover_photo_checkbox.html
    display_snippet: null
    default: "false"
    validators: ignore_missing boolean_validator
    output_validators: ignore_missing boolean_validator
    help_text: Set this to use the uploaded image as the instrument cover photo.

  - field_name: description
    label: Description
    preset: markdown
    form_placeholder: Some useful notes about the resource

  - field_name: format
    label: Format
    preset: resource_format_autocomplete


